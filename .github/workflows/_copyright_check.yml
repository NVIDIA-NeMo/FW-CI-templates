name: Copyright check

on:
  workflow_call:
    inputs:
      additional-find-args:
        required: false
        description: 'Command for other File types to search copyright'
        type: string
        #sample input string value: "-or -name *.yaml"
        #value: "-or -name *.yaml"

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Get PR info
        id: get-pr-info
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        uses: nv-gha-runners/get-pr-info@090577647b8ddc4e06e809e264f7881650ecdccf # main

      - name: Determine base reference
        id: get-sha
        run: |
          IS_PR=${{ startsWith(github.ref, 'refs/heads/pull-request/') }}
          BASE_REF=${{ (startsWith(github.ref, 'refs/heads/pull-request/') && fromJSON(steps.get-pr-info.outputs.pr-info).base.ref) || 'HEAD~1' }}

          git config --global user.email "you@example.com"
          git config --global user.name "GitHub Action"

          if [[ "$IS_PR" == "true" ]]; then
            git fetch origin "$BASE_REF"
            git merge "origin/$BASE_REF"
            BASE_SHA=$(git rev-parse "origin/$BASE_REF")
          else
            BASE_SHA=$(git rev-parse "$BASE_REF")
          fi

          echo "sha=$(git rev-parse HEAD)" | tee -a "$GITHUB_OUTPUT"
          echo "base_sha=${BASE_SHA}" | tee -a "$GITHUB_OUTPUT"

      - name: Get changed files
        id: changed-files
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
        with:
          sha: ${{ steps.get-sha.outputs.sha }}
          base_sha: ${{ steps.get-sha.outputs.base_sha }}
          files: '**/*.py'
          separator: ' '

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: copyright-checker

      - name: Check copyright headers
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: ./copyright-checker/.github/actions/copyright-checker
        with:
          changed-files: ${{ steps.changed-files.outputs.all_changed_files }}

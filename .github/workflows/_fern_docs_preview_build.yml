# Workflow 1 of 2 for Fern doc previews.
#
# Collects fern/ sources and PR metadata from the (possibly untrusted) PR
# branch and uploads them as an artifact. No secrets are used here, so this is
# safe to run on fork PRs using the regular pull_request trigger.
#
# The companion workflow (_fern_docs_preview_comment.yml) picks up the
# artifact, builds the preview with DOCS_FERN_TOKEN, and posts the PR comment.
# When the PR closes, _fern_docs_preview_cleanup.yml deletes the preview.
#
# Setup required in the consuming repo:
#
# 1. FOUR caller workflows are required — two pairs following the same
#    fork-safe handoff pattern:
#
#    fern-docs-preview-build.yml   (this half — build pair)
#      on:
#        pull_request:
#          paths: ['fern/**', ...]   # repo-specific path filter
#      jobs:
#        collect:
#          uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_fern_docs_preview_build.yml@vX.Y.Z
#
#    fern-docs-preview-comment.yml   (companion half — build pair)
#      on:
#        workflow_run:
#          workflows: ["Preview Fern Docs: Build"]
#          types: [completed]
#      jobs:
#        preview:
#          uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_fern_docs_preview_comment.yml@vX.Y.Z
#          secrets:
#            DOCS_FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
#
#    fern-docs-preview-close.yml   (close half — cleanup pair, no secrets)
#      on:
#        pull_request:
#          types: [closed]
#      jobs:
#        close:
#          uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_fern_docs_preview_close_collect.yml@vX.Y.Z
#
#    fern-docs-preview-cleanup.yml   (companion half — cleanup pair)
#      on:
#        workflow_run:
#          workflows: ["Preview Fern Docs: Close"]
#          types: [completed]
#      jobs:
#        cleanup:
#          uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_fern_docs_preview_cleanup.yml@vX.Y.Z
#          secrets:
#            DOCS_FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
#
# 2. If you override `artifact-name` here, pass the same value to the comment
#    workflow. The default (`fern-preview`) works when there is only one Fern
#    instance in the repo.
#
# 3. Configure the secret DOCS_FERN_TOKEN in the repo (or org) settings.
#
# 4. The default fern/ directory is at the repository root. Override
#    `fern-directory` if it is elsewhere.
#

name: "Preview Fern Docs: Build"

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name of the artifact to upload (must match the value used in the companion comment workflow)
        required: false
        type: string
        default: fern-preview
      fern-directory:
        description: Path to the fern directory relative to the repository root
        required: false
        type: string
        default: fern

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Save PR metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          mkdir -p preview-metadata
          echo "$PR_NUMBER" > preview-metadata/pr_number
          echo "$HEAD_REF" > preview-metadata/head_ref
          git diff --name-only "origin/${BASE_REF}...HEAD" -- '*.mdx' > preview-metadata/changed_mdx_files 2>/dev/null || true

      - name: Normalize fern directory
        if: inputs.fern-directory != 'fern'
        run: mv "${{ inputs.fern-directory }}" fern

      - name: Upload fern sources and metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            fern/
            preview-metadata/
          retention-days: 1

# Workflow 2 of 2 for Fern docs preview cleanup.
#
# Triggered by workflow_run after _fern_docs_preview_close_collect.yml
# completes. Downloads the close artifact, reads the preview URL embedded
# by _fern_docs_preview_comment.yml, and calls `fern docs preview delete
# --url` to remove the deployment.
#
# Using --url instead of --id means no checkout or fern.config.json is
# required. The URL comes from the <!-- fern-preview-url: ... --> marker
# in the PR comment, written by the companion comment workflow.
#
# This workflow always runs in the base repository context (workflow_run
# guarantee), so it can use GitHub OIDC to read the Fern token without
# exposing credentials to a fork PR.
#
# Setup required in the consuming repo:
#
#   fern-docs-preview-cleanup.yml
#     on:
#       workflow_run:
#         workflows: ["Preview Fern Docs: Close"]
#         types: [completed]
#     jobs:
#       cleanup:
#         uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_fern_docs_preview_cleanup.yml@vX.Y.Z
#         permissions:
#           actions: read
#           id-token: write
#         with:
#           aws-role-to-assume: arn:aws:iam::<account-id>:role/<role-name>
#           fern-secret-id: docs/fern/github/<owner>/<repo>/token
#
# Required configuration:
# - GitHub OIDC trust for the caller and this pinned reusable workflow.
# - An AWS role that can read the configured Fern secret.

name: "Preview Fern Docs: Cleanup"

on:
  workflow_call:
    inputs:
      aws-role-to-assume:
        description: AWS IAM role ARN used to read the Fern token
        required: true
        type: string
      aws-region:
        description: AWS region containing the Fern token secret
        required: false
        type: string
        default: us-east-2
      fern-secret-id:
        description: AWS Secrets Manager name or ARN containing the Fern token
        required: true
        type: string
      artifact-name:
        description: Artifact name uploaded by the close workflow
        required: false
        type: string
        default: fern-preview-close
      container-image:
        description: |
          Optional container image to run the job in, such as
          ghcr.io/nvidia/docs-builder-ci:<semver>. Leave empty to run
          directly on the runner, which installs Node.js and fern-api
          before each run.
        required: false
        type: string
        default: ''
jobs:
  cleanup:
    runs-on: ubuntu-latest
    container: ${{ inputs.container-image != '' && inputs.container-image || null }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      id-token: write
    steps:
      - name: Download close metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read preview URL
        id: preview
        run: |
          # actions/upload-artifact strips the close-metadata/ prefix.
          URL=$(cat preview_url 2>/dev/null || true)
          echo "preview_url=${URL}" >> "$GITHUB_OUTPUT"
          if [ -z "$URL" ]; then
            echo "No preview URL in artifact — nothing to delete"
          fi

      - name: Setup Node.js
        if: ${{ steps.preview.outputs.preview_url != '' && inputs.container-image == '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Fern CLI
        if: ${{ steps.preview.outputs.preview_url != '' && inputs.container-image == '' }}
        run: npm install -g fern-api

      - name: Configure AWS credentials
        if: steps.preview.outputs.preview_url != ''
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: ${{ inputs.aws-role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Read Fern token
        if: steps.preview.outputs.preview_url != ''
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2
        with:
          secret-ids: |
            FERN_TOKEN,${{ inputs.fern-secret-id }}

      - name: Delete preview deployment
        if: steps.preview.outputs.preview_url != ''
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
        run: |
          fern docs preview delete --url "${PREVIEW_URL}" \
            || echo "Preview deletion returned non-zero — it may already be gone"

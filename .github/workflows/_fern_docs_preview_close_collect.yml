# Workflow 1 of 2 for Fern docs preview cleanup.
#
# Runs on pull_request: types: [closed] with no secrets. Reads the
# fern-preview-url marker embedded in the PR comment by the companion build
# workflow (_fern_docs_preview_comment.yml) and uploads it as an artifact.
# The companion cleanup workflow (_fern_docs_preview_cleanup.yml) picks up
# the artifact via workflow_run and deletes the preview using --url, which
# requires no checkout or fern.config.json.
#
# This workflow runs safely in fork PR context: it only uses read-only
# GITHUB_TOKEN access and never touches repository secrets.
#
# Setup required in the consuming repo (see _fern_docs_preview_build.yml
# for the full four-workflow setup):
#
#   fern-docs-preview-close.yml
#     on:
#       pull_request:
#         types: [closed]
#     jobs:
#       close:
#         uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_fern_docs_preview_close_collect.yml@vX.Y.Z
#
# If you override `artifact-name`, pass the same value to the cleanup workflow.

name: "Preview Fern Docs: Close"

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Artifact name to upload (must match the value used in the cleanup workflow)
        required: false
        type: string
        default: fern-preview-close

permissions:
  pull-requests: read
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Find preview URL from PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p close-metadata
          URL=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("<!-- fern-preview-url:"))] | last | .body' \
            2>/dev/null \
            | grep -oP '(?<=<!-- fern-preview-url: )\S+(?= -->)' || true)
          echo "${URL:-}" > close-metadata/preview_url
          if [ -n "$URL" ]; then
            echo "Found preview URL: $URL"
          else
            echo "No preview comment found — no preview to clean up"
          fi

      - name: Upload close metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: close-metadata/
          retention-days: 1

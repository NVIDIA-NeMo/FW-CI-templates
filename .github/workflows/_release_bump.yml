name: "Release: bump version(s)"

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

on:
  workflow_call:
    inputs:
      release-ref:
        required: true
        description: Ref (SHA or branch) to release
        type: string
      validate-only:
        type: boolean
        required: false
        default: false
        description: Inert mode for per-PR rehearsals. Compute the bump and assert release preconditions; do not push, open a PR, or merge.
      dry-run:
        type: boolean
        required: false
        default: false
        description: Inert mode for workflow_dispatch rehearsals. Same precondition checks as validate-only; no side effects on the repo.
      version-bump-branch:
        type: string
        required: false
        default: main
        description: Branch to merge the bump commit into.
      skip-version-bump:
        type: boolean
        required: false
        default: false
        description: Skip the bump entirely (for dynamic versioning).
      restrict-to-admins:
        type: boolean
        required: false
        default: true
        description: Only repository admins may invoke. Always skipped under validate-only.
      release-branch-pattern:
        type: string
        required: false
        default: "[rv][0-9].[0-9].[0-9]"
        description: |
          Branch-protection pattern of the real release branches. In inert mode
          (validate-only or dry-run) the workflow asserts a rule for this pattern
          exists with `isAdminEnforced=false`. Real releases push through that rule
          via admin bypass, so this precondition is what makes the push succeed.
      app-id:
        type: string
        required: true
        description: GitHub App ID used to mint the bot token for git push and PR creation.
      library-name:
        type: string
        required: true
        description: Human-readable library name used in the bump PR title.
      bump-targets:
        type: string
        required: false
        default: ""
        description: |
          JSON array of bump targets, each `{"python-package": "...", "src-dir": "..."}`.
          Empty falls back to a single target derived from python-package + has-src-dir.
          The first target's current version becomes the release-version output.
      python-package:
        type: string
        required: false
        default: ""
        description: Single-target back-compat — ignored when bump-targets is non-empty.
      has-src-dir:
        type: boolean
        required: false
        default: false
        description: Single-target back-compat — ignored when bump-targets is non-empty.
      packaging:
        type: string
        required: false
        default: setuptools
        description: "Packaging tool (supported: setuptools, uv)."
      root-dir:
        type: string
        required: false
        default: "./"
        description: Sub-directory containing the package source(s).
    secrets:
      BOT_KEY:
        required: true
    outputs:
      release-version:
        description: The version being released (current version of the first bump target, before the bump).
        value: ${{ jobs.bump-next-version.outputs.release-version }}

permissions:
  contents: write
  pull-requests: write

jobs:
  check-admin-permission:
    runs-on: ubuntu-latest
    if: inputs.restrict-to-admins == true
    env:
      VALIDATE_ONLY: ${{ inputs.validate-only }}
    steps:
      - name: Check if user has admin permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });

            const permission = permissionLevel.permission;
            const validateOnly = process.env.VALIDATE_ONLY === 'true';
            console.log(`User ${context.actor} has permission: ${permission}`);

            if (permission !== 'admin') {
              const msg = `User ${context.actor} does not have admin permission (has: ${permission}). Only admins can release.`;
              if (validateOnly) {
                core.notice(`[validate-only] ${msg} — would block real release.`);
              } else {
                core.setFailed(msg);
              }
            }

  bump-next-version:
    runs-on: ubuntu-latest
    environment: ${{ inputs.validate-only && 'public' || 'main' }}
    needs: [check-admin-permission]
    if: |
      !inputs.skip-version-bump
      && (
        success() || !failure()
      )
      && !cancelled()
    outputs:
      release-version: ${{ steps.bump.outputs.release-version }}
      next-version: ${{ steps.bump.outputs.next-version }}
    env:
      IS_INERT: ${{ inputs.validate-only || inputs.dry-run }}
      PACKAGING: ${{ inputs.packaging }}
      BUMP_TARGETS: ${{ inputs.bump-targets }}
      FALLBACK_PYPROJECT_NAME: ${{ inputs.python-package }}
      FALLBACK_SRC_DIR: ${{ inputs.has-src-dir && 'src/' || '' }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.BOT_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: ${{ github.run_id }}
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.release-ref }}

      - name: Bump version(s)
        id: bump
        run: |
          cd ${{ github.run_id }}
          cd ${{ inputs.root-dir }}

          # Resolve bump targets. JSON array if provided, else single fallback.
          if [[ -n "$BUMP_TARGETS" ]]; then
            TARGETS_JSON="$BUMP_TARGETS"
          else
            TARGETS_JSON=$(jq -nc \
              --arg pkg "$FALLBACK_PYPROJECT_NAME" \
              --arg src "$FALLBACK_SRC_DIR" \
              '[{"python-package": $pkg, "src-dir": $src}]')
          fi

          echo "Resolved targets: $TARGETS_JSON"

          RELEASE_VERSION=""
          NEXT_VERSION=""
          BUMPED_FILES=()

          while IFS= read -r TGT; do
            PYPROJECT_NAME=$(echo "$TGT" | jq -r '."python-package"')
            SRC_DIR=$(echo "$TGT" | jq -r '."src-dir"')
            PACKAGE_INFO_FILE="${SRC_DIR}${PYPROJECT_NAME//.//}/package_info.py"

            echo "Bumping $PYPROJECT_NAME at $PACKAGE_INFO_FILE"

            if [[ "$PACKAGING" == "setuptools" || "$PACKAGING" == "uv" ]]; then
              MAJOR=$(awk '/^MAJOR = /' $PACKAGE_INFO_FILE | awk -F"= " '{print $2}')
              MINOR=$(awk '/^MINOR = /' $PACKAGE_INFO_FILE | awk -F"= " '{print $2}')
              PATCH=$(awk '/^PATCH = /' $PACKAGE_INFO_FILE | awk -F"= " '{print $2}')
              PRERELEASE=$(awk '/^PRE_RELEASE = /' $PACKAGE_INFO_FILE | awk -F"= " '{print $2}' | tr -d '"' | tr -d "'")

              CURRENT_VERSION="$MAJOR.$MINOR.$PATCH$PRERELEASE"

              if [[ "$PRERELEASE" != "" ]]; then
                if [[ "$PRERELEASE" == *rc* ]]; then
                  NEXT_PATCH=$PATCH
                  NEXT_PRERELEASE=rc$((${PRERELEASE#rc} + 1))
                elif [[ "$PRERELEASE" == *a* ]]; then
                  NEXT_PATCH=$PATCH
                  NEXT_PRERELEASE=a$((${PRERELEASE#a} + 1))
                else
                  echo "Unknown pre-release: $PRERELEASE"
                  exit 1
                fi
              else
                NEXT_PATCH=$((${PATCH} + 1))
                NEXT_PRERELEASE=$PRERELEASE
              fi

              sed -i "/^PATCH/c\PATCH = $NEXT_PATCH" $PACKAGE_INFO_FILE
              sed -i "/^PRE_RELEASE/c\PRE_RELEASE = \"$NEXT_PRERELEASE\"" $PACKAGE_INFO_FILE
              BUMPED_FILES+=("$PACKAGE_INFO_FILE")

              TARGET_NEXT="$MAJOR.$MINOR.$NEXT_PATCH$NEXT_PRERELEASE"
            else
              echo "Unsupported packaging: $PACKAGING"
              exit 1
            fi

            echo "  $PYPROJECT_NAME: $CURRENT_VERSION -> $TARGET_NEXT"

            if [[ -z "$RELEASE_VERSION" ]]; then
              RELEASE_VERSION="$CURRENT_VERSION"
              NEXT_VERSION="$TARGET_NEXT"
            fi
          done < <(echo "$TARGETS_JSON" | jq -c '.[]')

          echo "release-version=$RELEASE_VERSION" | tee -a "$GITHUB_OUTPUT"
          echo "next-version=$NEXT_VERSION" | tee -a "$GITHUB_OUTPUT"
          printf '%s\n' "${BUMPED_FILES[@]}" > /tmp/bumped-files.txt

      - name: Record computed versions
        if: env.IS_INERT == 'true'
        run: |
          {
            echo "## Bump rehearsal"
            echo
            echo "- release-version (current): \`${{ steps.bump.outputs.release-version }}\`"
            echo "- next-version (after bump): \`${{ steps.bump.outputs.next-version }}\`"
            echo
            echo "IS_INERT=true → preconditions are asserted (App permissions +"
            echo "source rule \`isAdminEnforced=false\`). No commit is pushed, no PR"
            echo "is opened, and no branch is created on this repo."
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Validate release config
        if: env.IS_INERT == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_PATTERN: ${{ inputs.release-branch-pattern }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          python3 - <<'PY'
          """Assert the preconditions a real release relies on, without side effects.

          Two reads, no writes:
            1. `GET /repos/{owner}/{repo}/installation` — assert the App installation
               on this repo holds `contents: write`, `pull_requests: write`, and
               `administration: read`. Proves the token is valid and the permissions
               that real releases will need are still granted.
            2. `branchProtectionRules` GraphQL query — assert a rule matching
               `release-branch-pattern` exists with `isAdminEnforced=false`. Real
               releases push the bump commit through that rule via admin bypass,
               so this is the precondition that makes the push succeed.
          """
          import json
          import os
          import sys
          import urllib.request

          OWNER = os.environ["OWNER"]
          REPO = os.environ["REPO"]
          SOURCE_PATTERN = os.environ["SOURCE_PATTERN"]
          TOKEN = os.environ["GH_TOKEN"]

          EXPECTED_PERMS = {
              "contents": "write",
              "pull_requests": "write",
              "administration": "read",
          }


          def api_request(url, method="GET", body=None):
              """Send an API request and return the parsed JSON body."""
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      "Authorization": f"bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                  },
                  method=method,
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode())


          def check_installation_permissions():
              """Assert the App installation has the permissions a real release needs."""
              installation = api_request(
                  f"https://api.github.com/repos/{OWNER}/{REPO}/installation"
              )
              perms = installation.get("permissions", {})
              missing = []
              for name, required in EXPECTED_PERMS.items():
                  level = perms.get(name)
                  if level is None:
                      missing.append(f"{name}={required} (not granted)")
                  elif required == "write" and level != "write":
                      missing.append(f"{name}=write (currently {level})")
                  elif required == "read" and level not in ("read", "write"):
                      missing.append(f"{name}=read (currently {level})")
              if missing:
                  sys.exit(
                      "::error::App installation is missing required permissions: "
                      + ", ".join(missing)
                  )
              print(f"App permissions OK: {perms}")


          def check_source_rule_admin_bypass():
              """Assert the source release-branch rule exists with admin enforcement off."""
              query = """
                query($owner:String!, $repo:String!) {
                  repository(owner:$owner, name:$repo) {
                    branchProtectionRules(first: 100) {
                      nodes { pattern isAdminEnforced }
                    }
                  }
                }
              """
              body = {"query": query, "variables": {"owner": OWNER, "repo": REPO}}
              data = api_request(
                  "https://api.github.com/graphql", method="POST", body=body
              )
              if data.get("errors"):
                  sys.exit(f"::error::GraphQL errors: {json.dumps(data['errors'])}")
              rules = data["data"]["repository"]["branchProtectionRules"]["nodes"]
              source = next((r for r in rules if r["pattern"] == SOURCE_PATTERN), None)
              if source is None:
                  sys.exit(
                      f"::error::No branch protection rule found for pattern "
                      f"{SOURCE_PATTERN!r}. Create one or override "
                      f"`release-branch-pattern` to match this repo."
                  )
              if source["isAdminEnforced"]:
                  sys.exit(
                      f"::error::Source rule {SOURCE_PATTERN!r} has "
                      f"isAdminEnforced=true. Real releases push through admin "
                      f"bypass; set isAdminEnforced=false on the source rule."
                  )
              print(f"Source rule {SOURCE_PATTERN!r} OK: isAdminEnforced=false")


          check_installation_permissions()
          check_source_rule_admin_bypass()
          PY

      - name: Resolve version-bump-branch
        if: env.IS_INERT == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_BRANCH: ${{ inputs.version-bump-branch }}
        run: |
          # Consumers that fall back to `github.ref_name` get a PR-derived ref
          # that is not the branch a real release would target:
          #   - `<pr-num>/merge` or `<pr-num>/head` on `pull_request` triggers,
          #   - `pull-request/<pr-num>` on `push` triggers via the copy-pr-bot mirror.
          # In all those cases, fall back to the repo's default branch.
          BRANCH="$INPUT_BRANCH"
          if [[ "$BRANCH" =~ ^[0-9]+/(merge|head)$ ]] || [[ "$BRANCH" =~ ^pull-request/[0-9]+$ ]]; then
            BRANCH=$(gh api "repos/${{ github.repository }}" --jq '.default_branch')
            echo "::warning::version-bump-branch resolved to PR-derived ref '$INPUT_BRANCH'; falling back to default branch '$BRANCH'."
          fi
          echo "VERSION_BUMP_BRANCH=$BRANCH" | tee -a $GITHUB_ENV

      - name: Create and push deployment branch
        if: env.IS_INERT == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd ${{ github.run_id }}
          cd ${{ inputs.root-dir }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TMP_BRANCH="deploy-release/$(uuidgen)"
          git checkout -b "$TMP_BRANCH"
          while IFS= read -r f; do
            [[ -n "$f" ]] && git add "$f"
          done < /tmp/bumped-files.txt

          git commit -s -m "beep boop 🤖: Bumping ${{ inputs.library-name }} to v${{ steps.bump.outputs.next-version }} [skip ci]" || echo "No changes to commit"
          git push -u origin "$TMP_BRANCH"
          echo "TMP_BRANCH=$TMP_BRANCH" | tee -a $GITHUB_ENV

          PR_URL=$(gh pr create \
            --base "$VERSION_BUMP_BRANCH" \
            --head "$TMP_BRANCH" \
            --title "beep boop 🤖: Bumping ${{ inputs.library-name }} to v${{ steps.bump.outputs.next-version }}" \
            --body "This is an automated PR to bump ${{ inputs.library-name }} to v${{ steps.bump.outputs.next-version }}.")
          PR_NUMBER="${PR_URL##*/}"
          echo "PR_NUMBER=$PR_NUMBER" | tee -a $GITHUB_ENV

      - name: Merge deploy-release branch into target
        if: env.IS_INERT == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd ${{ github.run_id }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Direct git push to the protected version-bump-branch. The source rule
          # has `isAdminEnforced=false` (asserted in inert mode by `Validate
          # release config`), so the bot bypasses required checks and approving-
          # review counts as a repo admin.
          git fetch origin "$VERSION_BUMP_BRANCH"
          git checkout "$VERSION_BUMP_BRANCH"
          git merge "$TMP_BRANCH"

          for attempt in {1..3}; do
            if git push origin "$VERSION_BUMP_BRANCH"; then
              echo "Git push to $VERSION_BUMP_BRANCH succeeded on attempt $attempt"
              break
            else
              echo "Git push to $VERSION_BUMP_BRANCH failed on attempt $attempt"
              if [[ $attempt -lt 3 ]]; then
                sleep $((RANDOM % 3 + 1))
                git fetch origin "$VERSION_BUMP_BRANCH"
                git reset --hard "origin/$VERSION_BUMP_BRANCH"
                git merge "$TMP_BRANCH"
              else
                echo "Git push to $VERSION_BUMP_BRANCH failed after 3 attempts"
                exit 1
              fi
            fi
          done

      - name: Delete temporary branch
        if: always() && env.IS_INERT == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd ${{ github.run_id }}
          if [[ -n "${TMP_BRANCH:-}" ]]; then
            git push -d origin "$TMP_BRANCH" || true
          fi

name: Secrets detector

on:
  workflow_call:

jobs:
  secrets-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ github.run_id }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install secrets detector
        run: pip install detect-secrets

      - name: Run on change-set
        run: |
          cd ${{ github.run_id }}
          TARGET_BRANCH="origin/${GITHUB_BASE_REF:-main}"
          echo "Target branch is: ${TARGET_BRANCH}"
          echo "Detecting secrets in the following files:"
          git diff --name-only --diff-filter=d --merge-base "$TARGET_BRANCH" -z | xargs -0 echo
          git diff --name-only --diff-filter=d --merge-base "$TARGET_BRANCH" -z | xargs -0 detect-secrets-hook --baseline .github/workflows/config/.secrets.baseline

      - name: Provide fix instructions on failure
        if: failure()
        run: |
          echo "## Secret Detector Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The secret detector found potential secrets in your changes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to fix:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If this is a real secret:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Remove the secret from your code immediately" >> $GITHUB_STEP_SUMMARY
          echo "2. Rotate/revoke the exposed credential" >> $GITHUB_STEP_SUMMARY
          echo "3. Remove or squash the commit containing the secret on your branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If this is a false positive:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Install detect-secrets: \`pip install detect-secrets\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Run: \`detect-secrets scan --exclude-files 'pyproject\.toml|\.github/workflows/config/\.secrets\.baseline' > .github/workflows/config/.secrets.baseline\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Review the updated baseline file to ensure the added entries are real false positives" >> $GITHUB_STEP_SUMMARY
          echo "4. Commit the updated baseline file" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For more information, see: https://github.com/Yelp/detect-secrets" >> $GITHUB_STEP_SUMMARY

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    if: github.repository_owner == 'NVIDIA-NeMo'
    runs-on: ubuntu-latest
    environment:
      name: main
      deployment: false
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.PAT }}
          release-type: simple
